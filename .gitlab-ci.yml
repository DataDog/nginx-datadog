# Cancel redundant pipelines when new commits are pushed to the same branch.
workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE =~ /^(api|schedule|web)$/

default:
  interruptible: true

include:
  - local: ".gitlab/build-and-test-all.yml"
  - local: ".gitlab/build-and-test-fast.yml"
  - local: ".gitlab/ssi-package.yml"
  - local: ".gitlab/one-pipeline.locked.yml"

variables:
  OCI_PACKAGE_NAME: datadog-apm-library-nginx
  OCI_AGENT_REGISTRY_PACKAGE_NAME: apm-library-nginx-package
  AGENT_REPO_PRODUCT_NAME: auto_inject-nginx
  LIB_INJECTION_NAME: dd-lib-nginx-init
  REPO_NOTIFICATION_CHANNEL: "#injection-platform"

stages:
  - build-and-test-fast
  - build-all
  - test-all
  - assemble
  - shared-pipeline
  - benchmarks

requirements_json_test:
  rules:
    - when: on_success
  variables:
    REQUIREMENTS_BLOCK_JSON_PATH: "metadata/requirements-block.json"
    REQUIREMENTS_ALLOW_JSON_PATH: "metadata/requirements-allow.json"

package-oci:
  # Both ssi-build jobs are optional because only one runs per pipeline type.
  # prepare-oci-package.sh validates that the ssi-sources directory for the
  # target architecture exists, and exits 1 if missing.
  needs:
    - job: ssi-build
      optional: true
    - job: ssi-build-all
      optional: true

# TODO: Re-enable when adding k8s injection support.
# Requires ci.nginx-datadog.apm-ecosystems-reliability-profile SSM parameter
# in AWS us-east-1 (ask infra/platform team to create it).
kubernetes-injection-test-ecr-publish:
  allow_failure: true

configure_system_tests:
  variables:
    SYSTEM_TESTS_LIBRARY: cpp_nginx
    SYSTEM_TESTS_SCENARIOS_GROUPS: "docker-ssi"

macrobenchmarks:
  stage: benchmarks
  needs: []
  trigger:
    include: ".gitlab/benchmarks.yml"
  rules:
    - if: $NIGHTLY_BENCHMARKS || $CI_COMMIT_REF_NAME == "master" || $CI_COMMIT_REF_NAME =~ /^release\/v/
      when: always
    - when: manual
      allow_failure: true

# TEMPORARY probe (branch pawel/ecr-assume-test only) — validates the OIDC-driven
# assume path to the apm-ecosystems-reliability ECR (no SSM profile). Remove before merge.
apm-ecosystems-ecr-assume-test:
  image: registry.ddbuild.io/images/mirror/amazon/aws-cli:2.4.29
  stage: build-and-test-fast
  needs: []
  tags: ["arch:amd64"]
  rules:
    - if: $CI_COMMIT_BRANCH == "pawel/ecr-assume-test"
      when: always
  variables:
    ECR_ACCOUNT: "235494822917"
  script:
    - set +e -x
    - echo "### 1. runner OIDC identity:"
    - aws sts get-caller-identity
    - echo "### 2. assume ddbuild-${CI_PROJECT_NAME}-ci via ExternalId:"
    - |
      creds=$(aws sts assume-role \
        --role-arn "arn:aws:iam::${ECR_ACCOUNT}:role/ddbuild-${CI_PROJECT_NAME}-ci" \
        --external-id "ddbuild-${CI_PROJECT_NAME}-ci" \
        --role-session-name ecr-assume-test 2>&1)
      if ! echo "$creds" | grep -q AccessKeyId; then echo "ASSUME FAILED:"; echo "$creds" | head -3; echo "### done"; exit 0; fi
      echo "ASSUME OK"
      export AWS_ACCESS_KEY_ID=$(echo "$creds" | python3 -c "import sys,json;print(json.load(sys.stdin)['Credentials']['AccessKeyId'])")
      export AWS_SECRET_ACCESS_KEY=$(echo "$creds" | python3 -c "import sys,json;print(json.load(sys.stdin)['Credentials']['SecretAccessKey'])")
      export AWS_SESSION_TOKEN=$(echo "$creds" | python3 -c "import sys,json;print(json.load(sys.stdin)['Credentials']['SessionToken'])")
      echo "### 3. identity after assume:"
      aws sts get-caller-identity
      echo "### 4. ECR access (AdministratorAccess):"
      aws ecr get-login-password --region us-east-1 >/dev/null && echo "ecr:GetAuthorizationToken OK"
      aws ecr describe-repositories --region us-east-1 --max-items 3 --query 'repositories[].repositoryName' && echo "ecr:DescribeRepositories OK"
    - echo "### done"
