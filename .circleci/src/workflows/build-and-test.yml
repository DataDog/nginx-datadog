- build_ingress_nginx_module:
    name: build ingress-nginx-<< matrix.version >> on << matrix.arch >>
    matrix:
      parameters:
        arch:
        - 'amd64'
        version:
        - v1.11.2
        - v1.11.1
        - v1.11.0
        - v1.10.4
        - v1.10.3
        - v1.10.2
        - v1.10.1
        - v1.10.0
- test_ingress:
    name: test ingress-nginx-<< matrix.nginx-version >> on << matrix.arch >>
    requires:
    - build ingress-nginx-<< matrix.nginx-version >> on << matrix.arch >>
    matrix:
      parameters:
        arch:
        - amd64
        base-image:
        - registry.k8s.io/ingress-nginx/controller
        nginx-version:
        - v1.11.2
        - v1.11.1
        - v1.11.0
        - v1.10.4
        - v1.10.3
        - v1.10.2
        - v1.10.1
        - v1.10.0
        nginx-flavor:
        - 'ingress-nginx'
        waf:
        - 'OFF'
- package-ingress-nginx:
    requires:
    - test ingress-nginx-<< matrix.version >> on amd64
    matrix:
      parameters:
        arch:
        - amd64
        version:
        - v1.11.2
        - v1.11.1
        - v1.11.0
        - v1.10.4
        - v1.10.3
        - v1.10.2
        - v1.10.1
        - v1.10.0

