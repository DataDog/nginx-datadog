when:
  and:
    - not: << pipeline.git.tag >>
    - not: << pipeline.parameters.build_all >>
jobs:
- build_openresty:
    matrix:
      parameters:
        arch:
        - amd64
        - arm64
        resty-version:
        - 1.27.1.1
        - 1.25.3.1
        - 1.25.3.2
        waf:
        - 'ON'
        - 'OFF'
    name: build openresty << matrix.resty-version >> on << matrix.arch >> WAF << matrix.waf >>
- test-openresty:
    matrix:
      parameters:
        arch:
        - amd64
        - arm64
        waf:
        - 'ON'
        - 'OFF'
        base-image:
        - openresty/openresty:1.27.1.1-alpine
        resty-version:
        - 1.27.1.1
    name: test openresty << matrix.resty-version >> on << matrix.base-image >>:<< matrix.arch >> WAF << matrix.waf >>
    requires:
    - build openresty << matrix.resty-version >> on << matrix.arch >> WAF << matrix.waf >>
- test-openresty:
    matrix:
      parameters:
        arch:
        - amd64
        - arm64
        waf:
        - 'ON'
        - 'OFF'
        base-image:
        - openresty/openresty:1.25.3.1-alpine
        resty-version:
        - 1.25.3.1
    name: test openresty << matrix.resty-version >> on << matrix.base-image >>:<< matrix.arch >> WAF << matrix.waf >>
    requires:
    - build openresty << matrix.resty-version >> on << matrix.arch >> WAF << matrix.waf >>
- test-openresty:
    matrix:
      parameters:
        arch:
        - amd64
        - arm64
        waf:
        - 'ON'
        - 'OFF'
        base-image:
        - openresty/openresty:1.25.3.2-alpine
        resty-version:
        - 1.25.3.2
    name: test openresty << matrix.resty-version >> on << matrix.base-image >>:<< matrix.arch >> WAF << matrix.waf >>
    requires:
    - build openresty << matrix.resty-version >> on << matrix.arch >> WAF << matrix.waf >>
