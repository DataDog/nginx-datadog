variables:
  CI_REGISTRY: "registry.ddbuild.io/ci/nginx-datadog"
  TESTS_IMAGES_REGISTRY: "$CI_REGISTRY/mirror"
  MUSL_TOOLCHAIN_IMAGE: "registry.ddbuild.io/ci/nginx-datadog/nginx_musl_toolchain@sha256:7175e4819bf7314f14342d6f2b2ea3e55fc8dad054fee2c65a5e3b612787666a"

# Git config for repo-defined jobs: submodule cloning and GitHub→GitLab URL
# rewriting via CI job token. Defined as a hidden job (not global) so
# 3rd-party includes (one-pipeline) don't inherit the rewrite.
.git-config:
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_DEPTH: 1
    GIT_CONFIG_COUNT: 1
    GIT_CONFIG_KEY_0: url.https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.ddbuild.io/DataDog/.insteadOf
    GIT_CONFIG_VALUE_0: https://github.com/DataDog/

.build:
  extends: .git-config
  image: $MUSL_TOOLCHAIN_IMAGE
  tags: ["arch:$ARCH"]
  variables:
    MAKE_JOB_COUNT: "8"

.build-nginx:
  extends: .build
  variables:
    RUM: "OFF"
  script:
    - make build-musl-aux
    - mkdir -p artifacts/$ARCH/$NGINX_VERSION/$WAF
    - cp .musl-build/ngx_http_datadog_module.so* artifacts/$ARCH/$NGINX_VERSION/$WAF/
  artifacts:
    paths:
      - artifacts/$ARCH/$NGINX_VERSION/$WAF/

.build-nginx-asan:
  extends: .build
  variables:
    RUM: "OFF"
    ASAN: "ON"
    BUILD_TYPE: "Debug"
  script:
    - make build-musl-aux
    - mkdir -p artifacts-asan/$ARCH/$NGINX_VERSION/$WAF
    - cp .musl-build/ngx_http_datadog_module.so* artifacts-asan/$ARCH/$NGINX_VERSION/$WAF/
  artifacts:
    paths:
      - artifacts-asan/$ARCH/$NGINX_VERSION/$WAF/

.build-nginx-rum:
  extends: .build
  variables:
    RUM: "ON"
  script:
    - make build-musl-aux
    - mkdir -p artifacts-rum/$ARCH/$NGINX_VERSION/$WAF
    - cp .musl-build/ngx_http_datadog_module.so* artifacts-rum/$ARCH/$NGINX_VERSION/$WAF/
  artifacts:
    paths:
      - artifacts-rum/$ARCH/$NGINX_VERSION/$WAF/

.build-openresty:
  extends: .build
  script:
    - make build-openresty
    - mkdir -p artifacts-openresty/$ARCH/$RESTY_VERSION/$WAF
    - cp .openresty-build/ngx_http_datadog_module.so* artifacts-openresty/$ARCH/$RESTY_VERSION/$WAF/
  artifacts:
    paths:
      - artifacts-openresty/$ARCH/$RESTY_VERSION/$WAF/

.build-ingress-nginx:
  extends: .build
  variables:
    WAF: "ON"
  script:
    - make build-ingress-nginx
    - mkdir -p artifacts-ingress/$ARCH/$INGRESS_NGINX_VERSION
    - cp .musl-build/ngx_http_datadog_module.so* artifacts-ingress/$ARCH/$INGRESS_NGINX_VERSION/
  artifacts:
    paths:
      - artifacts-ingress/$ARCH/$INGRESS_NGINX_VERSION/

.test:
  extends: .git-config
  image: $CI_REGISTRY/test
  tags: ["docker-in-docker:$ARCH"]

.test-nginx:
  extends: .test
  script:
    - uv run --project test test/bin/run.py --image $TESTS_IMAGES_REGISTRY/$BASE_IMAGE --module-path artifacts/$ARCH/$NGINX_VERSION/$WAF/ngx_http_datadog_module.so -- --verbose --failfast
  artifacts:
    paths:
      - test/logs/test.log

.test-nginx-asan:
  extends: .test
  script:
    - uv run --project test test/bin/run.py --asan --arch $ARCH --module-path artifacts-asan/$ARCH/$NGINX_VERSION/$WAF/ngx_http_datadog_module.so -- --verbose --failfast
  artifacts:
    when: always
    paths:
      - test/logs/test.log

.test-nginx-rum:
  extends: .test
  variables:
    RUM: "ON"
  script:
    - uv run --project test test/bin/run.py --image $TESTS_IMAGES_REGISTRY/$BASE_IMAGE --module-path artifacts-rum/$ARCH/$NGINX_VERSION/$WAF/ngx_http_datadog_module.so -- --verbose --failfast
  artifacts:
    paths:
      - test/logs/test.log

.test-ingress-nginx:
  extends: .test
  variables:
    NGINX_FLAVOR: ingress-nginx
  script:
    - uv run --project test test/bin/run.py --image $TESTS_IMAGES_REGISTRY/registry.k8s.io/ingress-nginx/controller:v$INGRESS_NGINX_VERSION --module-path artifacts-ingress/$ARCH/$INGRESS_NGINX_VERSION/ngx_http_datadog_module.so -- --verbose --failfast
  artifacts:
    paths:
      - test/logs/test.log

.test-openresty:
  extends: .test
  script:
    - uv run --project test test/bin/run.py --image $TESTS_IMAGES_REGISTRY/openresty/openresty:$RESTY_VERSION-alpine --module-path artifacts-openresty/$ARCH/$RESTY_VERSION/$WAF/ngx_http_datadog_module.so -- --verbose --failfast
  artifacts:
    paths:
      - test/logs/test.log
