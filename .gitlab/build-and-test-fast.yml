include:
  - local: ".gitlab/common.yml"

.build-and-test-fast:
  extends: .git-config
  stage: build-and-test-fast
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

build-formatter-image:
  extends: .build-and-test-fast
  image: registry.ddbuild.io/images/nydus:v2.3.8-dd
  tags: ["docker-in-docker:amd64"]
  script:
    - |
      HASH=$(cat Dockerfile.formatter | sha256sum | cut -d ' ' -f 1)
    - echo "FORMATTER_IMAGE_TAG=$CI_REGISTRY/formatter:$HASH" >> formatter-image.env
    - |
      if docker buildx imagetools inspect "$CI_REGISTRY/formatter:$HASH" > /dev/null 2>&1; then
        echo "Image $CI_REGISTRY/formatter:$HASH already exists. Skipping build."
      else
        docker build --progress=plain --platform linux/amd64 -t $CI_REGISTRY/formatter:$HASH -f Dockerfile.formatter .
        docker push $CI_REGISTRY/formatter:$HASH
        nydus-convert $CI_REGISTRY/formatter:$HASH $CI_REGISTRY/formatter:$HASH
      fi
  artifacts:
    reports:
      dotenv: formatter-image.env

lint:
  extends: .build-and-test-fast
  needs:
    - build-formatter-image
  image: $FORMATTER_IMAGE_TAG
  tags: ["arch:amd64"]
  script:
    - make lint

shellcheck:
  extends: .build-and-test-fast
  image: $CI_REGISTRY/nginx_musl_toolchain:rust-1.94
  tags: ["arch:amd64"]
  script:
    - find bin/ test/ example/ .gitlab/ -type f \( \( -executable -not -name '*.py' \) -o -name '*.sh' \) | xargs shellcheck --exclude SC1071,SC1091,SC2317

build-nginx-fast:
  extends:
    - .build-and-test-fast
    - .build-nginx
  parallel:
    matrix:
      - ARCH: ["amd64", "arm64"]
        # The version used by System Tests, in
        # https://github.com/DataDog/system-tests/blob/main/utils/build/docker/cpp_nginx/nginx.Dockerfile#L3
        # must be one of the ones below (and must match the one set in .github/workflows/system-tests.yml).
        # (This is why a latest but one version can be in build-nginx-fast but not in test-nginx-fast.)
        NGINX_VERSION:
          - "1.24.0"
          - "1.25.5"
          - "1.26.3"
          - "1.27.5"
          - "1.28.3"
          - "1.29.8"
          - "1.30.0"
        WAF: ["ON", "OFF"]

build-ingress-nginx-fast:
  extends:
    - .build-and-test-fast
    - .build-ingress-nginx
  parallel:
    matrix:
      - ARCH: ["amd64", "arm64"]
        INGRESS_NGINX_VERSION:
          - "1.13.9"
          - "1.14.5"
          - "1.15.1"

build-openresty-fast:
  extends:
    - .build-and-test-fast
    - .build-openresty
  parallel:
    matrix:
      - ARCH: ["amd64", "arm64"]
        RESTY_VERSION:
          - "1.27.1.2"
          - "1.29.2.3"
        WAF: ["ON", "OFF"]

