          - "1.24.0"
          - "1.25.0"
          - "1.25.1"
          - "1.25.2"
          - "1.25.3"
          - "1.25.4"
          - "1.25.5"
          - "1.26.0"
          - "1.26.1"
          - "1.26.2"
          - "1.26.3"
          - "1.27.0"
          - "1.27.1"
          - "1.27.2"
          - "1.27.3"
          - "1.27.4"
          - "1.27.5"
          - "1.28.0"
          - "1.28.1"
          - "1.28.2"
          - "1.28.3"
          - "1.29.0"
          - "1.29.1"
          - "1.29.2"
          - "1.29.3"
          - "1.29.4"
          - "1.29.5"
          - "1.29.6"
          - "1.29.7"
          - "1.29.8"
          - "1.30.0"
        WAF: ["OFF"]

test-nginx-fast:
  extends:
    - .build-and-test-fast
    - .test-nginx
  needs: [build-nginx-fast]
  parallel:
    matrix:
      - ARCH: ["amd64", "arm64"]
        BASE_IMAGE: ["nginx:1.24.0", "nginx:1.24.0-alpine"]
        NGINX_VERSION: ["1.24.0"]
        WAF: ["ON", "OFF"]
      - ARCH: ["amd64", "arm64"]
        BASE_IMAGE: ["nginx:1.25.5", "nginx:1.25.5-alpine"]
        NGINX_VERSION: ["1.25.5"]
        WAF: ["ON", "OFF"]
      - ARCH: ["amd64", "arm64"]
        BASE_IMAGE: ["nginx:1.26.3", "nginx:1.26.3-alpine"]
        NGINX_VERSION: ["1.26.3"]
        WAF: ["ON", "OFF"]
      - ARCH: ["amd64", "arm64"]
        BASE_IMAGE: ["nginx:1.27.5", "nginx:1.27.5-alpine"]
        NGINX_VERSION: ["1.27.5"]
        WAF: ["ON", "OFF"]
      - ARCH: ["amd64", "arm64"]
        BASE_IMAGE: ["nginx:1.28.3", "nginx:1.28.3-alpine"]
        NGINX_VERSION: ["1.28.3"]
        WAF: ["ON", "OFF"]
      - ARCH: ["amd64", "arm64"]
