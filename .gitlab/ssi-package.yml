# Assembles RUM-enabled nginx modules (built by build-nginx-rum-* jobs) into
# the directory layout expected by prepare-oci-package.sh / package-oci.
#
# Input  (from build-nginx-rum-fast/all artifacts):
#   artifacts-rum/$ARCH/$VERSION/OFF/ngx_http_datadog_module.so
#
# Output (consumed by prepare-oci-package.sh):
#   artifacts/ssi-sources/$ARCH/nginx/$VERSION/ngx_http_datadog_module.so
#   artifacts/ssi-sources/$ARCH/version

.ssi-assemble:
  image: registry.ddbuild.io/ci/nginx-datadog/nginx_musl_toolchain
  stage: build
  parallel:
    matrix:
      - ARCH: ["amd64", "arm64"]
  tags: ["arch:amd64"]
  script:
    - VERSION="${CI_COMMIT_TAG:-0.0.1-${CI_COMMIT_SHORT_SHA}}"
    - OUTPUT="artifacts/ssi-sources/${ARCH}"
    - mkdir -p "${OUTPUT}"
    - |
      for dir in artifacts-rum/${ARCH}/*/OFF; do
        nginx_ver=$(basename $(dirname "$dir"))
        mkdir -p "${OUTPUT}/nginx/${nginx_ver}"
        cp "$dir/ngx_http_datadog_module.so" "${OUTPUT}/nginx/${nginx_ver}/"
      done
    - echo "${VERSION}" > "${OUTPUT}/version"
    - echo "Assembled modules:" && find "${OUTPUT}" -type f | sort
  artifacts:
    paths:
      - artifacts/ssi-sources/

ssi-build:
  extends: .ssi-assemble
  needs: [build-nginx-rum-fast]
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

ssi-build-all:
  extends: .ssi-assemble
  needs: [build-nginx-rum-all]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/
      when: always
    - when: never
