include:
  - local: ".gitlab/common.yml"

.build-and-test-fast:
  stage: build-and-test-fast
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

.build-and-test-all:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/
      when: always
    - when: never

.build-all:
  extends: .build-and-test-all
  stage: build-all

.test-all:
  extends: .build-and-test-all
  stage: test-all
